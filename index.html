<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>讀書追蹤</title>
  <style>
    :root { --ink:#21302a; --muted:#6c7770; --paper:#fffdf8; --canvas:#f5f1e9; --line:#e7e1d5; --forest:#1f5a49; --forest-dark:#164538; --sage:#dceadf; --gold:#e8b14c; --coral:#cc6d51; --blue:#4381a4; --shadow:0 14px 38px rgba(49, 57, 45, .09); --radius:18px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-width:320px; font-family:ui-rounded, "SF Pro Rounded", "PingFang TC", "Noto Sans TC", system-ui, sans-serif; color:var(--ink); line-height:1.55; background:radial-gradient(circle at 7% 3%, #fff 0, transparent 26rem), var(--canvas); }
    body::before { content:""; position:fixed; z-index:-1; right:-11rem; bottom:-12rem; width:34rem; height:34rem; border-radius:50%; background:rgba(220,234,223,.65); filter:blur(12px); }
    header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:auto; padding:18px 28px; background:rgba(255,253,248,.82); border:1px solid rgba(255,255,255,.7); border-top:0; border-radius:0 0 22px 22px; backdrop-filter:blur(16px); box-shadow:0 6px 24px rgba(49,57,45,.05); }
    header h1 { display:flex; align-items:center; gap:9px; color:var(--forest-dark); font-family:Georgia, "Noto Serif TC", serif; font-size:1.4rem; letter-spacing:.04em; }
    .header-actions { display:flex; align-items:center; gap:10px; } nav { display:flex; gap:5px; padding:4px; background:#f0ede5; border-radius:12px; }
    nav button { border:0; background:transparent; border-radius:9px; color:var(--muted); cursor:pointer; font:600 .88rem inherit; padding:8px 15px; transition:.2s ease; }
    nav button:hover { color:var(--forest); }
    nav button.active { background:var(--paper); color:var(--forest-dark); box-shadow:0 2px 8px rgba(38,56,44,.12); }
    main { max-width:1180px; margin:0 auto; padding:34px 28px 56px; }
    .dashboard-hero { position:relative; overflow:hidden; padding:30px 34px; margin-bottom:22px; color:#fffdf8; background:linear-gradient(120deg, var(--forest-dark), var(--forest) 63%, #367563); border-radius:var(--radius); box-shadow:0 18px 36px rgba(27,79,63,.2); }
    .dashboard-hero::after { content:""; position:absolute; width:220px; height:220px; right:-42px; top:-92px; border:1px solid rgba(255,255,255,.3); border-radius:50%; box-shadow:-34px 39px 0 -1px rgba(255,255,255,.12), -68px 78px 0 -1px rgba(255,255,255,.09); }
    .eyebrow { margin-bottom:4px; color:#cfe3d6; font-size:.78rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    .dashboard-hero h2 { position:relative; max-width:620px; font-family:Georgia, "Noto Serif TC", serif; font-size:clamp(1.55rem, 3vw, 2.25rem); letter-spacing:.025em; line-height:1.25; }
    .dashboard-hero p:not(.eyebrow) { position:relative; margin-top:9px; color:#dceee2; font-size:.95rem; }
    .stats-grid { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; margin-bottom:22px; }
    .stat-box { position:relative; overflow:hidden; min-height:112px; padding:18px; background:rgba(255,253,248,.9); border:1px solid rgba(231,225,213,.9); border-radius:15px; box-shadow:0 6px 20px rgba(49,57,45,.045); transition:transform .2s ease, box-shadow .2s ease; }
    .stat-box:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
    .stat-link { width:100%; border:0; text-align:left; color:inherit; cursor:pointer; font:inherit; }
    .stat-link:focus-visible, .dashboard-book-link:focus-visible, .tag-link:focus-visible { outline:3px solid rgba(31,90,73,.3); outline-offset:3px; }
    .stat-box:nth-child(2) .num, .stat-box:nth-child(3) .num { color:var(--blue); } .stat-box:nth-child(4) .num { color:var(--forest); } .stat-box:nth-child(5) .num { color:var(--coral); }
    .stat-box .num { color:var(--forest-dark); font:700 1.85rem Georgia, serif; line-height:1.05; }
    .stat-box .label { margin-top:9px; color:var(--muted); font-size:.8rem; font-weight:600; }
    .dashboard-columns { display:grid; grid-template-columns:1.15fr .85fr; gap:18px; align-items:start; }
    .card { padding:23px; margin-bottom:18px; background:rgba(255,253,248,.92); border:1px solid rgba(231,225,213,.9); border-radius:var(--radius); box-shadow:var(--shadow); }
    .section-title { display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; margin-bottom:5px; border-bottom:1px solid var(--line); font-family:Georgia, "Noto Serif TC", serif; font-size:1.08rem; }
    .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px; font-size:.76rem; font-weight:700; letter-spacing:.02em; }
    .badge.want_to_read { background:#e5f0f6; color:#2e6686; } .badge.reading { background:#fff0d2; color:#966512; } .badge.completed { background:#dceee1; color:#236044; }
    .progress-bar { height:7px; overflow:hidden; margin:9px 0; background:#e8e5dc; border-radius:999px; } .progress-bar .fill { height:100%; background:linear-gradient(90deg, var(--forest), #5c9b7e); border-radius:inherit; transition:width .35s ease; }
    .book-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; }
    .book-card { position:relative; overflow:hidden; min-height:205px; padding:22px 21px 18px 32px; background:var(--paper); border:1px solid var(--line); border-radius:15px; box-shadow:0 7px 20px rgba(49,57,45,.055); cursor:pointer; transition:.2s ease; }
    .book-card::before { content:""; position:absolute; top:0; bottom:0; left:0; width:8px; background:linear-gradient(var(--gold), #d98b5b); } .book-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); border-color:#d6cbbb; }
    .book-card h3 { margin:8px 0 4px; font-size:1.08rem; line-height:1.35; } .book-card .author { min-height:24px; color:var(--muted); font-size:.86rem; } .book-card .pages { color:var(--muted); font-size:.82rem; } .book-card .tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:12px; }
    .tag-chip { display:inline-block; padding:3px 9px; border-radius:999px; background:#eef3ed; color:#456250; font-size:.74rem; font-weight:600; }
    .filter-bar { display:flex; flex-wrap:wrap; gap:9px; align-items:center; padding:14px; margin-bottom:19px; background:rgba(255,253,248,.72); border:1px solid var(--line); border-radius:15px; }
    .filter-bar select, .filter-bar input { min-height:39px; padding:8px 12px; border:1px solid #dcd5c8; border-radius:10px; outline:0; background:#fffefb; color:var(--ink); font:inherit; font-size:.88rem; } .filter-bar input { flex:1; min-width:180px; } .filter-bar select:focus, .filter-bar input:focus, .modal input:focus, .modal textarea:focus, .modal select:focus { border-color:var(--forest); box-shadow:0 0 0 3px rgba(31,90,73,.12); }
    .btn { border:1px solid transparent; border-radius:10px; cursor:pointer; font:700 .86rem inherit; padding:9px 15px; transition:.18s ease; } .btn:hover { transform:translateY(-1px); } .btn-primary { background:var(--forest); color:#fff; box-shadow:0 5px 12px rgba(31,90,73,.18); } .btn-primary:hover { background:var(--forest-dark); } .btn-danger { background:#fff0ec; border-color:#f2cdc3; color:#a5452c; } .btn-success { background:#dceee1; color:#205c42; } .btn-sm { padding:5px 10px; font-size:.78rem; } .btn-outline { border-color:#d8d1c5; background:transparent; color:var(--ink); }
    .lock-button { padding:8px 11px; border:1px solid #d8d1c5; border-radius:10px; background:rgba(255,253,248,.7); color:var(--muted); cursor:pointer; font:700 .8rem inherit; } .lock-button:hover { color:var(--forest-dark); border-color:var(--forest); }
    .modal-overlay { position:fixed; inset:0; z-index:200; display:none; align-items:flex-start; justify-content:center; padding:52px 20px; overflow-y:auto; background:rgba(24,41,32,.42); backdrop-filter:blur(5px); } .modal-overlay.active { display:flex; } .modal { width:100%; max-width:520px; padding:28px; background:var(--paper); border:1px solid rgba(255,255,255,.5); border-radius:20px; box-shadow:0 24px 65px rgba(20,35,27,.27); } .modal h2 { margin-bottom:20px; font-family:Georgia, "Noto Serif TC", serif; font-size:1.35rem; } .modal .form-group { margin-bottom:14px; } .modal label { display:block; margin-bottom:5px; color:var(--muted); font-size:.83rem; font-weight:700; } .modal input, .modal select, .modal textarea { width:100%; padding:9px 11px; border:1px solid #dcd5c8; border-radius:10px; outline:0; background:#fffefb; font:inherit; font-size:.9rem; } .modal textarea { min-height:95px; resize:vertical; } .modal .actions { display:flex; justify-content:flex-end; gap:9px; margin-top:21px; } .modal .row { display:flex; gap:12px; } .modal .row .form-group { flex:1; }
    .note-item { padding:14px 16px; margin-bottom:10px; border-left:3px solid var(--gold); border-radius:0 11px 11px 0; background:#fbf8f0; } .note-item .meta { margin-bottom:5px; color:var(--muted); font-size:.8rem; } .note-item .content { white-space:pre-wrap; font-size:.92rem; } .note-item .actions { display:flex; gap:7px; margin-top:10px; }
    .empty { padding:36px 20px; color:var(--muted); text-align:center; } .reading-item { display:flex; align-items:center; justify-content:space-between; gap:18px; padding:13px 0; border-bottom:1px solid var(--line); } .reading-item:last-child { border-bottom:0; } .reading-item .info { flex:1; min-width:0; } .reading-item .info h4 { font-size:.95rem; } .reading-item .info .pages { color:var(--muted); font-size:.8rem; } .reading-item .progress-bar { width:130px; margin:0; } .dashboard-book-link { width:100%; border:0; background:transparent; color:inherit; cursor:pointer; font:inherit; text-align:left; transition:color .18s ease; } .dashboard-book-link:hover h4 { color:var(--forest); } .tag-link { border:0; cursor:pointer; font:inherit; } .hidden { display:none !important; }
    .pin-overlay { position:fixed; inset:0; z-index:500; display:grid; place-items:center; padding:24px; background:rgba(18,44,35,.74); backdrop-filter:blur(12px); } .pin-overlay[hidden] { display:none; } .pin-panel { width:min(100%, 390px); padding:34px; background:var(--paper); border:1px solid rgba(255,255,255,.7); border-radius:22px; box-shadow:0 25px 70px rgba(10,28,20,.35); text-align:center; } .pin-mark { display:grid; place-items:center; width:52px; height:52px; margin:0 auto 16px; border-radius:17px; background:var(--sage); color:var(--forest-dark); font-size:1.45rem; } .pin-panel h2 { font-family:Georgia, "Noto Serif TC", serif; font-size:1.45rem; } .pin-panel p { margin:8px 0 21px; color:var(--muted); font-size:.9rem; } .pin-form { display:grid; gap:11px; } .pin-form input { width:100%; padding:12px; border:1px solid #dcd5c8; border-radius:11px; background:#fffefb; color:var(--ink); font:700 1.2rem ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing:.45em; text-align:center; outline:0; } .pin-form input:focus { border-color:var(--forest); box-shadow:0 0 0 3px rgba(31,90,73,.12); } .pin-error { min-height:21px; color:#a5452c; font-size:.82rem; } .pin-form .btn { padding:11px; }
    @media (max-width:760px) { header { margin:0 10px; padding:14px 16px; align-items:flex-start; flex-direction:column; } .header-actions { width:100%; } nav { width:100%; justify-content:space-between; } nav button { flex:1; padding:7px 6px; } main { padding:24px 16px 42px; } .dashboard-hero { padding:25px 23px; } .stats-grid { grid-template-columns:repeat(2,1fr); } .dashboard-columns { grid-template-columns:1fr; gap:0; } .modal .row { flex-direction:column; gap:0; } }
    @media (max-width:420px) { header h1 { font-size:1.22rem; } nav button { font-size:.77rem; } .filter-bar .btn-primary { width:100%; } .reading-item .progress-bar { width:90px; } }
  </style>
</head>
<body>

<header>
  <h1><span aria-hidden="true">◒</span> 閱讀日常</h1>
  <div class="header-actions">
    <nav>
      <button data-tab="dashboard" class="active">儀表板</button>
      <button data-tab="books">書籍</button>
      <button data-tab="notes">筆記</button>
      <button data-tab="tags">標籤</button>
    </nav>
    <button id="lock-app" class="lock-button hidden" type="button">🔒 鎖定</button>
  </div>
</header>

<main>
  <!-- Dashboard -->
  <div id="tab-dashboard" class="tab-content">
    <section class="dashboard-hero" aria-labelledby="dashboard-title">
      <p class="eyebrow">Reading tracker</p>
      <h2 id="dashboard-title">把每一頁閱讀，留成自己的風景。</h2>
      <p>在這裡整理書單、記錄進度，也收藏每次被文字觸動的時刻。</p>
    </section>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="dashboard-columns">
      <div>
        <div class="card">
          <h3 class="section-title">📖 閱讀中</h3>
          <div id="currently-reading"></div>
        </div>
        <div class="card">
          <h3 class="section-title">✅ 最近完成</h3>
          <div id="recently-completed"></div>
        </div>
      </div>
      <div class="card">
        <h3 class="section-title">🏷️ 熱門標籤</h3>
        <div id="top-tags"></div>
      </div>
    </div>
  </div>

  <!-- Books -->
  <div id="tab-books" class="tab-content hidden">
    <div class="filter-bar">
      <select id="book-filter-status">
        <option value="">全部狀態</option>
        <option value="want_to_read">想讀</option>
        <option value="reading">閱讀中</option>
        <option value="completed">已讀完</option>
      </select>
      <select id="book-filter-tag"></select>
      <input type="text" id="book-search" placeholder="搜尋書名或作者...">
      <button class="btn btn-primary" onclick="openBookModal()">＋ 新增書籍</button>
    </div>
    <div class="book-grid" id="book-grid"></div>
  </div>

  <!-- Notes -->
  <div id="tab-notes" class="tab-content hidden">
    <div class="filter-bar">
      <select id="note-filter-book"><option value="">全部書籍</option></select>
      <button class="btn btn-primary" onclick="openNoteModal()">＋ 新增筆記</button>
    </div>
    <div id="note-list"></div>
  </div>

  <!-- Tags -->
  <div id="tab-tags" class="tab-content hidden">
    <div class="filter-bar">
      <input type="text" id="tag-input" placeholder="輸入標籤名稱..." style="flex:1;max-width:300px">
      <button class="btn btn-primary" onclick="addTag()">＋ 新增標籤</button>
    </div>
    <div id="tag-list"></div>
  </div>
</main>

<!-- Book Modal -->
<div class="modal-overlay" id="book-modal">
  <div class="modal">
    <h2 id="book-modal-title">新增書籍</h2>
    <input type="hidden" id="book-id">
    <div class="form-group">
      <label>書名 *</label>
      <input type="text" id="book-title">
    </div>
    <div class="form-group">
      <label>作者</label>
      <input type="text" id="book-author">
    </div>
    <div class="row">
      <div class="form-group">
        <label>總頁數</label>
        <input type="number" id="book-total-pages" min="0" value="0">
      </div>
      <div class="form-group">
        <label>當前頁數</label>
        <input type="number" id="book-current-page" min="0" value="0">
      </div>
    </div>
    <div class="row">
      <div class="form-group">
        <label>狀態</label>
        <select id="book-status">
          <option value="want_to_read">想讀</option>
          <option value="reading">閱讀中</option>
          <option value="completed">已讀完</option>
        </select>
      </div>
      <div class="form-group">
        <label>評分 (1-5)</label>
        <input type="number" id="book-rating" min="1" max="5" placeholder="未評分">
      </div>
    </div>
    <div class="form-group">
      <label>標籤（逗號分隔）</label>
      <input type="text" id="book-tags" placeholder="例如：自我成長, 心理學">
    </div>
    <div class="form-group">
      <label>ISBN</label>
      <input type="text" id="book-isbn">
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal('book-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveBook()">儲存</button>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div class="modal-overlay" id="note-modal">
  <div class="modal">
    <h2 id="note-modal-title">新增筆記</h2>
    <input type="hidden" id="note-id">
    <div class="form-group">
      <label>書籍 *</label>
      <select id="note-book-id"></select>
    </div>
    <div class="form-group">
      <label>頁碼</label>
      <input type="number" id="note-page" min="0" placeholder="選填">
    </div>
    <div class="form-group">
      <label>內容 *</label>
      <textarea id="note-content"></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal('note-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveNote()">儲存</button>
    </div>
  </div>
</div>

<!-- Book Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:600px">
    <div id="detail-content"></div>
  </div>
</div>

<div class="pin-overlay" id="pin-overlay" role="dialog" aria-modal="true" aria-labelledby="pin-title">
  <div class="pin-panel">
    <div class="pin-mark" aria-hidden="true">🔒</div>
    <h2 id="pin-title">輸入 PIN Code</h2>
    <p>請輸入 PIN Code 以開啟你的閱讀日常。</p>
    <form class="pin-form" id="pin-form">
      <input id="pin-input" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="6" aria-label="PIN Code" required autofocus>
      <div id="pin-error" class="pin-error" role="alert"></div>
      <button class="btn btn-primary" type="submit">解鎖網站</button>
    </form>
  </div>
</div>

<script>
// GitHub Pages is static, so it uses the production API; local and Render
// deployments keep the same-origin API for a simpler development setup.
const API = location.hostname.endsWith('github.io')
  ? 'https://reading-tracker-21do.onrender.com'
  : '';
const STATUS_LABELS = { want_to_read: '想讀', reading: '閱讀中', completed: '已讀完' };
const PIN_CODE = '999999';
const PIN_STORAGE_KEY = 'reading-tracker-unlocked';

const pinOverlay = document.getElementById('pin-overlay');
const pinForm = document.getElementById('pin-form');
const pinInput = document.getElementById('pin-input');
const pinError = document.getElementById('pin-error');
const lockButton = document.getElementById('lock-app');

function unlockApp() {
  localStorage.setItem(PIN_STORAGE_KEY, 'true');
  pinOverlay.hidden = true;
  lockButton.classList.remove('hidden');
  pinError.textContent = '';
  pinInput.value = '';
}

function lockApp() {
  localStorage.removeItem(PIN_STORAGE_KEY);
  pinOverlay.hidden = false;
  lockButton.classList.add('hidden');
  pinInput.value = '';
  pinError.textContent = '';
  pinInput.focus();
}

pinForm.addEventListener('submit', event => {
  event.preventDefault();
  if (pinInput.value === PIN_CODE) {
    unlockApp();
  } else {
    pinError.textContent = 'PIN Code 不正確，請再試一次。';
    pinInput.select();
  }
});

lockButton.addEventListener('click', lockApp);

if (localStorage.getItem(PIN_STORAGE_KEY) === 'true') {
  unlockApp();
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: '請求失敗' }));
    throw new Error(err.error);
  }
  return res.status === 204 ? null : res.json();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function progressBar(pct) {
  return `<div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>`;
}

function tagChips(tags) {
  return (tags || []).map(t => `<span class="tag-chip">${esc(t.name)}</span>`).join('');
}

// Tab navigation
function showTab(tab) {
  document.querySelectorAll('nav button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'books') loadBooks();
  if (tab === 'notes') loadNotes();
  if (tab === 'tags') loadTags();
}

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

async function goToBooks({ status = '', tag = '' } = {}) {
  showTab('books');
  await loadTagFilter();
  document.getElementById('book-filter-status').value = status;
  document.getElementById('book-filter-tag').value = tag;
  await loadBooks();
}

function goToNotes() {
  showTab('notes');
}

// Dashboard
async function loadDashboard() {
  const stats = await api('/api/stats');
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = `
    <button class="stat-box stat-link" type="button" onclick="goToBooks()"><div class="num">${stats.total_books}</div><div class="label">總書數</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToBooks({status:'want_to_read'})"><div class="num">${stats.by_status.want_to_read}</div><div class="label">想讀</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToBooks({status:'reading'})"><div class="num">${stats.by_status.reading}</div><div class="label">閱讀中</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToBooks({status:'completed'})"><div class="num">${stats.by_status.completed}</div><div class="label">已讀完</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToBooks({status:'completed'})"><div class="num">${stats.completed_this_year}</div><div class="label">今年完成</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToBooks()"><div class="num">${stats.total_pages_read}</div><div class="label">已讀頁數</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToNotes()"><div class="num">${stats.total_notes}</div><div class="label">筆記數</div></button>
    <button class="stat-box stat-link" type="button" onclick="goToBooks({status:'completed'})"><div class="num">${stats.avg_rating ?? '—'}</div><div class="label">平均評分</div></button>
  `;

  const cr = document.getElementById('currently-reading');
  if (stats.currently_reading.length === 0) {
    cr.innerHTML = '<div class="empty">目前沒有閱讀中的書籍</div>';
  } else {
    cr.innerHTML = stats.currently_reading.map(b => `
      <button class="reading-item dashboard-book-link" type="button" onclick="openDetail(${b.id})">
        <div class="info">
          <h4>${esc(b.title)}</h4>
          <div class="pages">${b.current_page}/${b.total_pages} 頁 (${b.progress}%)</div>
        </div>
        ${progressBar(b.progress)}
      </button>
    `).join('');
  }

  const rc = document.getElementById('recently-completed');
  if (stats.recently_completed.length === 0) {
    rc.innerHTML = '<div class="empty">尚無完成的書籍</div>';
  } else {
    rc.innerHTML = stats.recently_completed.map(b => `
      <button class="reading-item dashboard-book-link" type="button" onclick="openDetail(${b.id})">
        <div class="info">
          <h4>${esc(b.title)} ${b.rating ? '⭐'.repeat(b.rating) : ''}</h4>
          <div class="pages">${esc(b.author)} · ${b.finished_at ? new Date(b.finished_at).toLocaleDateString() : ''}</div>
        </div>
      </button>
    `).join('');
  }

  const tt = document.getElementById('top-tags');
  if (stats.top_tags.length === 0) {
    tt.innerHTML = '<div class="empty">尚無標籤</div>';
  } else {
    tt.innerHTML = stats.top_tags.map(t => `<button class="tag-chip tag-link" type="button" onclick="goToBooks({tag:decodeURIComponent('${encodeURIComponent(t.name).replace(/'/g, '%27')}')})" style="font-size:0.9rem;padding:4px 14px">${esc(t.name)} (${t.count})</button>`).join(' ');
  }
}

// Books
let allTags = [];

async function loadBooks() {
  const status = document.getElementById('book-filter-status').value;
  const tag = document.getElementById('book-filter-tag').value;
  const q = document.getElementById('book-search').value;
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  if (tag) params.set('tag', tag);
  if (q) params.set('q', q);

  const books = await api('/api/books?' + params.toString());
  const grid = document.getElementById('book-grid');
  if (books.length === 0) {
    grid.innerHTML = '<div class="empty">沒有符合的書籍</div>';
    return;
  }
  grid.innerHTML = books.map(b => `
    <div class="book-card" onclick="openDetail(${b.id})">
      <h3>${esc(b.title)}</h3>
      <div class="author">${esc(b.author)}</div>
      <span class="badge ${b.status}">${STATUS_LABELS[b.status]}</span>
      ${b.total_pages > 0 ? `<div class="pages" style="margin-top:8px">${b.current_page}/${b.total_pages} 頁 (${b.progress}%)</div>${progressBar(b.progress)}` : ''}
      <div class="tags">${tagChips(b.tags)}</div>
    </div>
  `).join('');
}

async function loadTagFilter() {
  const tags = await api('/api/tags');
  allTags = tags;
  const sel = document.getElementById('book-filter-tag');
  sel.innerHTML = '<option value="">全部標籤</option>' + tags.map(t => `<option value="${esc(t.name)}">${esc(t.name)}</option>`).join('');
}

document.getElementById('book-filter-status').addEventListener('change', loadBooks);
document.getElementById('book-filter-tag').addEventListener('change', loadBooks);
document.getElementById('book-search').addEventListener('input', loadBooks);

function openBookModal(book = null) {
  document.getElementById('book-modal-title').textContent = book ? '編輯書籍' : '新增書籍';
  document.getElementById('book-id').value = book?.id ?? '';
  document.getElementById('book-title').value = book?.title ?? '';
  document.getElementById('book-author').value = book?.author ?? '';
  document.getElementById('book-total-pages').value = book?.total_pages ?? 0;
  document.getElementById('book-current-page').value = book?.current_page ?? 0;
  document.getElementById('book-status').value = book?.status ?? 'want_to_read';
  document.getElementById('book-rating').value = book?.rating ?? '';
  document.getElementById('book-tags').value = book?.tags?.map(t => t.name).join(', ') ?? '';
  document.getElementById('book-isbn').value = book?.isbn ?? '';
  document.getElementById('book-modal').classList.add('active');
}

async function saveBook() {
  const id = document.getElementById('book-id').value;
  const tags = document.getElementById('book-tags').value
    .split(',').map(t => t.trim()).filter(Boolean);
  const data = {
    title: document.getElementById('book-title').value.trim(),
    author: document.getElementById('book-author').value.trim(),
    isbn: document.getElementById('book-isbn').value.trim(),
    total_pages: parseInt(document.getElementById('book-total-pages').value) || 0,
    current_page: parseInt(document.getElementById('book-current-page').value) || 0,
    status: document.getElementById('book-status').value,
    rating: document.getElementById('book-rating').value ? parseInt(document.getElementById('book-rating').value) : null,
    tags,
  };
  if (!data.title) { alert('書名為必填'); return; }
  try {
    if (id) {
      await api('/api/books/' + id, { method: 'PUT', body: JSON.stringify(data) });
    } else {
      await api('/api/books', { method: 'POST', body: JSON.stringify(data) });
    }
    closeModal('book-modal');
    loadBooks();
    loadTagFilter();
  } catch (e) { alert(e.message); }
}

async function deleteBook(id) {
  if (!confirm('確定要刪除這本書嗎？相關筆記也會一併刪除。')) return;
  await api('/api/books/' + id, { method: 'DELETE' });
  closeModal('detail-modal');
  loadBooks();
}

// Book detail
async function openDetail(id) {
  const book = await api('/api/books/' + id);
  const notes = await api('/api/notes?book_id=' + id);
  const c = document.getElementById('detail-content');
  c.innerHTML = `
    <h2>${esc(book.title)}</h2>
    <p style="color:var(--muted);margin-bottom:12px">${esc(book.author)}</p>
    <div style="margin-bottom:12px">
      <span class="badge ${book.status}">${STATUS_LABELS[book.status]}</span>
      ${book.rating ? '⭐'.repeat(book.rating) : ''}
      <span style="margin-left:8px;font-size:0.85rem;color:var(--muted)">${book.current_page}/${book.total_pages} 頁 (${book.progress}%)</span>
    </div>
    ${book.total_pages > 0 ? progressBar(book.progress) : ''}
    <div style="margin:12px 0">${tagChips(book.tags)}</div>
    ${book.isbn ? `<div style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">ISBN: ${esc(book.isbn)}</div>` : ''}

    <div style="margin:20px 0 12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick='openBookModal(${JSON.stringify(book).replace(/'/g,"&#39;")})'>編輯</button>
      <button class="btn btn-outline btn-sm" onclick="quickProgress(${book.id}, ${book.current_page}, ${book.total_pages})">更新進度</button>
      <button class="btn btn-success btn-sm" onclick="addNoteForBook(${book.id})">加筆記</button>
      <button class="btn btn-outline btn-sm" onclick="downloadBookNotes(${book.id})">下載筆記</button>
      <button class="btn btn-danger btn-sm" onclick="deleteBook(${book.id})">刪除</button>
    </div>

    <h3 style="margin-top:20px;margin-bottom:12px">📝 筆記 (${notes.length})</h3>
    <div id="detail-notes">
      ${notes.length === 0 ? '<div class="empty">尚無筆記</div>' : notes.map(n => `
        <div class="note-item">
          <div class="meta">${n.page != null ? '第 ' + n.page + ' 頁 · ' : ''}${new Date(n.created_at).toLocaleDateString()}</div>
          <div class="content">${esc(n.content)}</div>
          <div class="actions">
            <button class="btn btn-outline btn-sm" onclick="editNote(${n.id})">編輯</button>
            <button class="btn btn-danger btn-sm" onclick="deleteNote(${n.id}, ${book.id})">刪除</button>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:20px;text-align:right">
      <button class="btn btn-outline" onclick="closeModal('detail-modal')">關閉</button>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('active');
}

function quickProgress(id, current, total) {
  const input = prompt(`更新進度 (目前 ${current}/${total} 頁):`, current);
  if (input === null) return;
  const page = parseInt(input);
  if (isNaN(page) || page < 0) { alert('請輸入有效頁數'); return; }
  api('/api/books/' + id + '/progress', { method: 'PATCH', body: JSON.stringify({ current_page: page }) })
    .then(() => openDetail(id))
    .catch(e => alert(e.message));
}

function addNoteForBook(bookId) {
  closeModal('detail-modal');
  openNoteModal(null, bookId);
}

function yamlValue(value) {
  return JSON.stringify(String(value ?? ''));
}

function safeFileName(value) {
  return String(value ?? '閱讀筆記').replace(/[\\/:*?"<>|]/g, '-').trim() || '閱讀筆記';
}

function buildBookNotesMarkdown(book, notes) {
  const tags = book.tags || [];
  const frontmatterTags = tags.length
    ? tags.map(tag => `  - ${yamlValue(tag.name)}`).join('\n')
    : '  - 未分類';
  const sections = notes
    .slice()
    .sort((a, b) => (a.page ?? Number.MAX_SAFE_INTEGER) - (b.page ?? Number.MAX_SAFE_INTEGER))
    .map(note => `## ${note.page != null ? `第 ${note.page} 頁` : '未標註頁碼'}\n\n${note.content.trim()}\n`)
    .join('\n');
  return `---\ntitle: ${yamlValue(book.title)}\nauthor: ${yamlValue(book.author)}\nstatus: ${book.status}\ntags:\n${frontmatterTags}\n---\n\n# ${book.title}\n\n> 作者：${book.author || '未提供'}  \n> 閱讀狀態：${STATUS_LABELS[book.status]}\n\n${sections}`;
}

async function downloadBookNotes(bookId) {
  let book;
  let notes;
  try {
    [book, notes] = await Promise.all([
      api('/api/books/' + bookId),
      api('/api/notes?book_id=' + bookId),
    ]);
  } catch (error) {
    alert(error.message || '無法取得筆記資料');
    return;
  }

  if (!notes.length) {
    alert('這本書尚無筆記可下載');
    return;
  }

  const markdown = buildBookNotesMarkdown(book, notes);
  const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${safeFileName(book.title)} 筆記.md`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

// Notes
let allBooks = [];

async function loadNotes() {
  const bookId = document.getElementById('note-filter-book').value;
  const params = bookId ? '?book_id=' + bookId : '';
  const notes = await api('/api/notes' + params);
  const list = document.getElementById('note-list');
  if (notes.length === 0) {
    list.innerHTML = '<div class="empty">尚無筆記</div>';
    return;
  }
  const bookMap = {};
  allBooks.forEach(b => bookMap[b.id] = b);
  list.innerHTML = notes.map(n => {
    const book = bookMap[n.book_id];
    return `
      <div class="note-item">
        <div class="meta">
          <strong>${esc(book?.title || '?')}</strong>
          ${n.page != null ? ' · 第 ' + n.page + ' 頁' : ''}
          · ${new Date(n.created_at).toLocaleDateString()}
        </div>
        <div class="content">${esc(n.content)}</div>
        <div class="actions">
          <button class="btn btn-outline btn-sm" onclick="editNote(${n.id})">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteNote(${n.id})">刪除</button>
        </div>
      </div>
    `;
  }).join('');
}

async function loadBookFilter() {
  allBooks = await api('/api/books');
  const sel = document.getElementById('note-filter-book');
  sel.innerHTML = '<option value="">全部書籍</option>' + allBooks.map(b => `<option value="${b.id}">${esc(b.title)}</option>`).join('');
  const noteSel = document.getElementById('note-book-id');
  noteSel.innerHTML = '<option value="">請選擇</option>' + allBooks.map(b => `<option value="${b.id}">${esc(b.title)}</option>`).join('');
}

document.getElementById('note-filter-book').addEventListener('change', loadNotes);

function openNoteModal(note = null, presetBookId = null) {
  document.getElementById('note-modal-title').textContent = note ? '編輯筆記' : '新增筆記';
  document.getElementById('note-id').value = note?.id ?? '';
  loadBookFilter().then(() => {
    document.getElementById('note-book-id').value = note?.book_id ?? presetBookId ?? '';
  });
  document.getElementById('note-page').value = note?.page ?? '';
  document.getElementById('note-content').value = note?.content ?? '';
  document.getElementById('note-modal').classList.add('active');
}

async function saveNote() {
  const id = document.getElementById('note-id').value;
  const data = {
    book_id: parseInt(document.getElementById('note-book-id').value),
    content: document.getElementById('note-content').value.trim(),
    page: document.getElementById('note-page').value ? parseInt(document.getElementById('note-page').value) : null,
  };
  if (!data.book_id) { alert('請選擇書籍'); return; }
  if (!data.content) { alert('內容為必填'); return; }
  try {
    if (id) {
      await api('/api/notes/' + id, { method: 'PUT', body: JSON.stringify(data) });
    } else {
      await api('/api/notes', { method: 'POST', body: JSON.stringify(data) });
    }
    closeModal('note-modal');
    loadNotes();
  } catch (e) { alert(e.message); }
}

async function editNote(id) {
  const note = await api('/api/notes/' + id);
  closeModal('detail-modal');
  openNoteModal(note);
}

async function deleteNote(id, bookId) {
  if (!confirm('確定要刪除此筆記？')) return;
  await api('/api/notes/' + id, { method: 'DELETE' });
  if (bookId) openDetail(bookId);
  else loadNotes();
}

// Tags
async function loadTags() {
  const tags = await api('/api/tags');
  const list = document.getElementById('tag-list');
  if (tags.length === 0) {
    list.innerHTML = '<div class="empty">尚無標籤</div>';
    return;
  }
  list.innerHTML = tags.map(t => `
    <div class="reading-item">
      <div class="info">
        <h4>${esc(t.name)}</h4>
        <div class="pages">${t.book_count} 本書</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteTag(${t.id}, '${esc(t.name)}')">刪除</button>
    </div>
  `).join('');
}

async function addTag() {
  const name = document.getElementById('tag-input').value.trim();
  if (!name) { alert('請輸入標籤名稱'); return; }
  try {
    await api('/api/tags', { method: 'POST', body: JSON.stringify({ name }) });
    document.getElementById('tag-input').value = '';
    loadTags();
  } catch (e) { alert(e.message); }
}

async function deleteTag(id, name) {
  if (!confirm(`確定要刪除標籤「${name}」？`)) return;
  await api('/api/tags/' + id, { method: 'DELETE' });
  loadTags();
}

// Modal helpers
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});

// Init
loadDashboard();
loadTagFilter();
loadBookFilter();
</script>
